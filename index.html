<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay 2 KSH – M-Pesa (Sandbox)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .amount {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin: 20px 0;
        }
        .amount small {
            font-size: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>💳 M-Pesa Payment</h1>
        <p>You will be charged exactly</p>
        <div class="amount">
            KSh <span id="amountDisplay">2.00</span>
        </div>
        
        <form id="paymentForm">
            <input type="tel" id="phone" placeholder="M-Pesa number (e.g., 0712345678)" required>
            <button type="submit" id="payBtn">Pay 2 KSh</button>
        </form>
        
        <div id="message"></div>
        <div class="note">
            🔐 Sandbox mode – no real money deducted.<br>
            You will receive an STK Push to enter your PIN.
        </div>
    </div>

    <script>
        // The backend URL is the same origin (relative path) because backend serves this HTML
        const BACKEND_URL = "/initiate-payment";

        const form = document.getElementById('paymentForm');
        const phoneInput = document.getElementById('phone');
        const payBtn = document.getElementById('payBtn');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let phone = phoneInput.value.trim();
            // Remove any leading +254 or 0
            if (phone.startsWith('+254')) phone = phone.substring(1);
            if (phone.startsWith('0')) phone = '254' + phone.substring(1);
            
            // Validate Kenyan number
            if (!phone.match(/^(2547|2541)\d{8}$/)) {
                showMessage("Enter a valid Kenyan phone number (e.g., 0712345678)", "error");
                return;
            }
            
            // Normalize to 07... format for display/backend (backend will handle)
            let normalizedPhone = phone;
            if (normalizedPhone.startsWith('254')) {
                normalizedPhone = '0' + normalizedPhone.substring(3);
            }
            
            showMessage("Processing...", "info");
            payBtn.disabled = true;
            
            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        phone: normalizedPhone, 
                        amount: 2.00 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage("✅ STK Push sent! Check your phone and enter PIN to complete payment of 2 KSH.", "success");
                    phoneInput.value = "";
                } else {
                    showMessage("❌ " + (data.message || "Payment failed. Try again."), "error");
                }
            } catch (err) {
                console.error(err);
                showMessage("❌ Network error. Is the backend running?", "error");
            } finally {
                payBtn.disabled = false;
            }
        });
        
        function showMessage(msg, type) {
            messageDiv.innerHTML = msg;
            messageDiv.className = type;
            setTimeout(() => {
                if (messageDiv.className === type) {
                    messageDiv.innerHTML = "";
                    messageDiv.className = "";
                }
            }, 8000);
        }
    </script>
</body>
  </html>
