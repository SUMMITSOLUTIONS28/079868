<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Pesa Payment | KES 10</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#f0fdf4;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:1rem}
    .card{max-width:420px;width:100%;background:white;border-radius:2rem;box-shadow:0 25px 45px rgba(0,0,0,0.1);padding:2rem 1.5rem;text-align:center}
    h2{color:#166534;font-size:1.8rem;margin-bottom:0.5rem}
    .price{font-size:3rem;font-weight:800;color:#15803d;margin:0.5rem 0}
    .input-group{text-align:left;margin:1.5rem 0}
    label{font-weight:600;color:#374151}
    input{width:100%;padding:0.9rem 1rem;border:1.5px solid #e2e8f0;border-radius:1.2rem;font-size:1rem}
    button{background:#15803d;color:white;border:none;width:100%;padding:0.9rem;font-size:1.1rem;font-weight:bold;border-radius:2rem;cursor:pointer}
    .note{margin-top:1.5rem;font-size:0.7rem;color:#6b7280}
    .error-msg{color:#b91c1c;background:#fee2e2;border-radius:2rem;padding:0.5rem;margin-top:1rem}
  </style>
</head>
<body>
<div class="card">
  <h2>📱 M-Pesa Payment</h2>
  <div class="price">KES 10</div>
  <div class="input-group">
    <label>📞 M-Pesa phone number</label>
    <input type="tel" id="phone" placeholder="0712345678">
  </div>
  <button id="payBtn">Pay KES 10</button>
  <div class="note">🔒 You'll receive a prompt on your phone. Real transaction.</div>
  <div id="message"></div>
</div>
<script>
  const BACKEND_URL = "https://zero79868.onrender.com"; // CHANGE THIS

  const payBtn = document.getElementById('payBtn');
  const phoneInput = document.getElementById('phone');
  const msgDiv = document.getElementById('message');

  payBtn.onclick = async () => {
    const phone = phoneInput.value.trim();
    if (!/^07\d{8}$/.test(phone)) {
      msgDiv.innerHTML = '<div class="error-msg">❌ Enter valid Safaricom number (07XXXXXXXX)</div>';
      return;
    }
    payBtn.disabled = true;
    payBtn.innerText = 'Processing...';
    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({amount:10, phone})
      });
      const data = await res.json();
      if (res.ok && data.redirect_url) window.location.href = data.redirect_url;
      else throw new Error(data.error || 'Payment failed');
    } catch (err) {
      msgDiv.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
      payBtn.disabled = false;
      payBtn.innerText = 'Pay KES 10';
    }
  };
</script>
</body>
</html>
