<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>M-Pesa Payment | KES 10</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 1rem;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.1);
      padding: 2rem 1.5rem;
      text-align: center;
      transition: transform 0.2s;
    }
    .card:hover { transform: scale(1.01); }
    h2 {
      color: #166534;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .amount {
      background: #e6f7e6;
      display: inline-block;
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 1rem;
      color: #15803d;
      margin-bottom: 1.5rem;
    }
    .price {
      font-size: 3rem;
      font-weight: 800;
      color: #15803d;
      margin: 0.5rem 0;
    }
    .input-group {
      text-align: left;
      margin: 1.5rem 0;
    }
    label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      font-size: 1rem;
      transition: 0.2s;
      background: #fafafa;
    }
    input:focus {
      outline: none;
      border-color: #15803d;
      background: white;
      box-shadow: 0 0 0 3px rgba(21,128,61,0.1);
    }
    button {
      background: #15803d;
      color: white;
      border: none;
      width: 100%;
      padding: 0.9rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 2rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    button:hover {
      background: #166534;
      transform: translateY(-2px);
    }
    .note {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #6b7280;
      border-top: 1px solid #e5e7eb;
      padding-top: 1rem;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      color: #b91c1c;
      background: #fee2e2;
      border-radius: 2rem;
      padding: 0.5rem;
      font-size: 0.8rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>📱 M-Pesa Payment</h2>
  <div class="amount">Lipa Na M-Pesa</div>
  <div class="price">KES 10</div>
  <div class="input-group">
    <label>📞 M-Pesa phone number</label>
    <input type="tel" id="phone" placeholder="0712345678" autocomplete="off">
    <small style="color:#6b7280;">Enter the number registered on M-Pesa</small>
  </div>
  <button id="payBtn">
    <span>💳 Pay KES 10</span>
  </button>
  <div class="note">
    🔒 You'll receive a prompt on your phone to enter PIN. Real transaction.
  </div>
  <div id="message" style="margin-top: 12px;"></div>
</div>

<script>
  // ✅ This is your actual Render backend URL
  const BACKEND_URL = "https://zero79868.onrender.com/initiate-payment";

  const payBtn = document.getElementById('payBtn');
  const phoneInput = document.getElementById('phone');
  const messageDiv = document.getElementById('message');

  payBtn.addEventListener('click', async () => {
    let phone = phoneInput.value.trim();
    // Kenyan Safaricom number validation (07xxxxxxxx)
    if (!phone.match(/^07\d{8}$/)) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Please enter a valid Safaricom number (07XXXXXXXX)</div>';
      return;
    }

    // Disable button & show loading
    const originalText = payBtn.innerHTML;
    payBtn.innerHTML = '<span class="spinner"></span> Processing...';
    payBtn.disabled = true;
    messageDiv.innerHTML = '';

    try {
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: 10, phone: phone })
      });
      const data = await response.json();
      if (response.ok && data.redirect_url) {
        window.location.href = data.redirect_url;
      } else {
        throw new Error(data.error || 'Payment initiation failed');
      }
    } catch (err) {
      messageDiv.innerHTML = `<div class="error-msg">⚠️ ${err.message}. Please try again.</div>`;
      payBtn.innerHTML = originalText;
      payBtn.disabled = false;
    }
  });
</script>
</body>
</html>
